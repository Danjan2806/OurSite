---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lilluucore-backend
  namespace: saas
  labels:
    app: lilluucore
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lilluucore
      component: backend
  template:
    metadata:
      labels:
        app: lilluucore
        component: backend
    spec:
      containers:
        - name: backend
          image: saas-builder-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-password
            - name: SPRING_DATASOURCE_ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-admin-url
            - name: SPRING_DATASOURCE_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-admin-username
            - name: SPRING_DATASOURCE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-admin-password
            - name: SPRING_REDIS_HOST
              value: "redis-service"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: generated-sites
              mountPath: /app/generated
      volumes:
        - name: generated-sites
          persistentVolumeClaim:
            claimName: generated-sites-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lilluucore-frontend
  namespace: saas
  labels:
    app: lilluucore
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lilluucore
      component: frontend
  template:
    metadata:
      labels:
        app: lilluucore
        component: frontend
    spec:
      containers:
        - name: frontend
          image: saas-builder-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.lilluucore.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.lilluucore.com/ws"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: saas_main
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
