---
apiVersion: v1
kind: Namespace
metadata:
  name: saas

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: saas
spec:
  selector:
    app: lilluucore
    component: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: saas
spec:
  selector:
    app: lilluucore
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: saas
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: saas
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: saas
spec:
  selector:
    app: kafka
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: saas
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: generated-sites-pvc
  namespace: saas
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: saas-secrets
  namespace: saas
type: Opaque
stringData:
  db-url: "jdbc:postgresql://postgres-service:5432/saas_main"
  db-username: "saas_admin"
  db-password: "change-me-in-production"
  db-admin-url: "jdbc:postgresql://postgres-service:5432/postgres"
  db-admin-username: "saas_admin"
  db-admin-password: "change-me-in-production"
  jwt-secret: "change-this-jwt-secret-to-something-long-and-random-in-production"
