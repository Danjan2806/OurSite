server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: lilluucore

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saas_main}
    username: ${SPRING_DATASOURCE_USERNAME:saas_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:saas_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  datasource-admin:
    url: ${SPRING_DATASOURCE_ADMIN_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_ADMIN_USERNAME:saas_admin}
    password: ${SPRING_DATASOURCE_ADMIN_PASSWORD:saas_secret}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 60000ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: saas-builder-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.saas.*"

  cache:
    type: redis
    redis:
      time-to-live: 600000

jwt:
  secret: ${JWT_SECRET:saas-builder-jwt-secret-key-2024-very-long-key-for-security}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:3001"
  site:
    generated-path: ${SITE_GENERATED_PATH:./generated}
    base-domain: saas.local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.saas: DEBUG
    org.springframework.security: INFO
